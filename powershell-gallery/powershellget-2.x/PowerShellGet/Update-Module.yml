syntaxes:
- syntax: |-
    ```Syntax
    Update-Module
        [[-Name] <String[]>]
        [-RequiredVersion <String>]
        [-MaximumVersion <String>]
        [-Credential <PSCredential>]
        [-Scope <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Force]
        [-AllowPrerelease]
        [-AcceptLicense]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
