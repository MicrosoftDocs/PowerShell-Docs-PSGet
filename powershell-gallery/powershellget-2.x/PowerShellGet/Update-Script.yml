syntaxes:
- syntax: |-
    ```Syntax
    Update-Script
        [[-Name] <String[]>]
        [-RequiredVersion <String>]
        [-MaximumVersion <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Credential <PSCredential>]
        [-Force]
        [-AllowPrerelease]
        [-AcceptLicense]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
