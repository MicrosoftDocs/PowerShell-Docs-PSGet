syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-Module
        [-Name] <String[]>
        [-MinimumVersion <String>]
        [-RequiredVersion <String>]
        [-MaximumVersion <String>]
        [-AllVersions]
        [-Force]
        [-AllowPrerelease]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Uninstall-Module
        [-InputObject] <PSObject[]>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
