syntaxes:
- syntax: |-
    ```Syntax
    Install-Module
        [-Name] <String[]>
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-RequiredVersion <String>]
        [-Repository <String[]>]
        [-Credential <PSCredential>]
        [-Scope <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-AllowClobber]
        [-SkipPublisherCheck]
        [-Force]
        [-AllowPrerelease]
        [-AcceptLicense]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Install-Module
        [-InputObject] <PSObject[]>
        [-Credential <PSCredential>]
        [-Scope <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-AllowClobber]
        [-SkipPublisherCheck]
        [-Force]
        [-AcceptLicense]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
