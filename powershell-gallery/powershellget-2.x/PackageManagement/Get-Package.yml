syntaxes:
- syntax: |-
    ```Syntax
    Get-Package
        [[-Name] <String[]>]
        [-RequiredVersion <String>]
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-AllVersions]
        [-Force]
        [-ForceBootstrap]
        [-ProviderName <String[]>]
        [-Destination <String>]
        [-ExcludeVersion]
        [-Scope <String>]
        [-SkipDependencies]
        [<CommonParameters>]
    ```
  parameterSetName: NuGet
  isDefault: false
- syntax: |-
    ```Syntax
    Get-Package
        [[-Name] <String[]>]
        [-RequiredVersion <String>]
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-AllVersions]
        [-Force]
        [-ForceBootstrap]
        [-ProviderName <String[]>]
        [-Scope <String>]
        [-PackageManagementProvider <String>]
        [-Type <String>]
        [-AllowClobber]
        [-SkipPublisherCheck]
        [-InstallUpdate]
        [-NoPathUpdate]
        [-AllowPrereleaseVersions]
        [<CommonParameters>]
    ```
