syntaxes:
- syntax: |-
    ```Syntax
    Find-Script
        [[-Name] <String[]>]
        [-MinimumVersion <Version>]
        [-MaximumVersion <Version>]
        [-RequiredVersion <Version>]
        [-AllVersions]
        [-IncludeDependencies]
        [-Filter <String>]
        [-Tag <String[]>]
        [-Includes <String[]>]
        [-Command <String[]>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Repository <String[]>]
        [-Credential <PSCredential>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
