syntaxes:
- syntax: |-
    ```Syntax
    Install-Script
        [-Name] <String[]>
        [-MinimumVersion <Version>]
        [-MaximumVersion <Version>]
        [-RequiredVersion <Version>]
        [-Repository <String[]>]
        [-Scope <String>]
        [-NoPathUpdate]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Credential <PSCredential>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Install-Script
        [-InputObject] <PSObject[]>
        [-Scope <String>]
        [-NoPathUpdate]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Credential <PSCredential>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
