      Use this parameter to restrict the variables that are exported by the module. **VariablesToExport**
      can remove variables from the list of exported variables, but it can't add variables to the list.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
