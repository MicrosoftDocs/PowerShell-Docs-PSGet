syntaxes:
- syntax: |-
    ```Syntax
    Find-RoleCapability
        [[-Name] <String[]>]
        [-ModuleName <String>]
        [-MinimumVersion <Version>]
        [-MaximumVersion <Version>]
        [-RequiredVersion <Version>]
        [-AllVersions]
        [-Tag <String[]>]
        [-Filter <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Repository <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
