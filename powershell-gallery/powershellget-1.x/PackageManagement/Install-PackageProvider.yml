syntaxes:
- syntax: |-
    ```Syntax
    Install-PackageProvider
        [-Name] <String[]>
        [-RequiredVersion <String>]
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-Credential <PSCredential>]
        [-Scope <String>]
        [-Source <String[]>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-AllVersions]
        [-Force]
        [-ForceBootstrap]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PackageBySearch
  isDefault: true
- syntax: |-
    ```Syntax
    Install-PackageProvider
        [-InputObject] <SoftwareIdentity[]>
        [-Scope <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-AllVersions]
        [-Force]
        [-ForceBootstrap]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PackageByInputObject
  isDefault: false
inputs:
- name: <xref href="Microsoft.PackageManagement.Packaging.SoftwareIdentity" data-throw-if-not-resolved="False" />
