    description: |-
      Forces the command to run without asking for user confirmation.
      Re-imports a package provider.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ForceBootstrap
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet forces Package Management to automatically install the package provider.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum allowed version of the package provider that you want to import. If you do not
      add this parameter, `Import-PackageProvider` imports the highest available version of the provider.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum allowed version of the package provider that you want to import. If you do not
      add this parameter, `Import-PackageProvider` imports the highest available version of the package
      that also satisfies any maximum version that is specified using the *MaximumVersion* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies one or more package provider names. Wildcards are not permitted.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequiredVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
