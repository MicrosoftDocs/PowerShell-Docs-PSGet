    Get-PackageSource
        [[-Name] <String>]
        [-Location <String>]
        [-Force]
        [-ForceBootstrap]
        [-ProviderName <String[]>]
        [-ConfigFile <String>]
        [-SkipValidate]
        [<CommonParameters>]
    ```
  parameterSetName: NuGet
  isDefault: false
