    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TypesToProcess
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the type files (`.ps1xml`) that run when the module is imported.

      When you import the module, PowerShell runs the `Update-TypeData` cmdlet with the specified files.
      Because type files aren't scoped, they affect all session states in the session.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: VariablesToExport
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the variables that the module exports. Wildcards are permitted.

      Use this parameter to restrict which variables that are exported by the module.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: true
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Update-PSModuleManifest
        [-Path] <String>
        [-NestedModules <Object[]>]
        [-Guid <Guid>]
        [-Author <String>]
        [-CompanyName <String>]
        [-Copyright <String>]
        [-RootModule <String>]
        [-ModuleVersion <Version>]
        [-Description <String>]
        [-ProcessorArchitecture <ProcessorArchitecture>]
        [-CompatiblePSEditions <String[]>]
        [-PowerShellVersion <Version>]
        [-ClrVersion <Version>]
        [-DotNetFrameworkVersion <Version>]
        [-PowerShellHostName <String>]
        [-PowerShellHostVersion <Version>]
        [-RequiredModules <Object[]>]
        [-TypesToProcess <String[]>]
        [-FormatsToProcess <String[]>]
        [-ScriptsToProcess <String[]>]
        [-RequiredAssemblies <String[]>]
        [-FileList <String[]>]
        [-ModuleList <Object[]>]
        [-FunctionsToExport <String[]>]
        [-AliasesToExport <String[]>]
        [-VariablesToExport <String[]>]
        [-CmdletsToExport <String[]>]
        [-DscResourcesToExport <String[]>]
        [-Tags <String[]>]
        [-ProjectUri <Uri>]
        [-LicenseUri <Uri>]
        [-IconUri <Uri>]
        [-ReleaseNotes <String>]
        [-Prerelease <String>]
        [-HelpInfoUri <Uri>]
        [-DefaultCommandPrefix <String>]
        [-ExternalModuleDependencies <String[]>]
        [-RequireLicenseAcceptance]
        [-PrivateData <Hashtable>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
examples:
- title: Example 1
  description: |-
    This example changes the **Author** property in the module manifest to `New Author`.

    ```powershell
    Update-PSModuleManifest -Path 'C:\MyModules\TestModule' -Author 'New Author'
    ```
- title: Example 2
  description: |-
    This example changes the **Prerelease** property to `beta2`.

    ```powershell
    Update-PSModuleManifest -Path 'C:\MyModules\TestModule' -Prerelease 'beta2'
    ```
- title: Example 3
  description: |-
    This example updates multiple properties.

    ```powershell
    $parameters = @{
