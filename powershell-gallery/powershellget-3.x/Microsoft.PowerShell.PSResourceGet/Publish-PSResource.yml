syntaxes:
- syntax: |-
    ```Syntax
    Publish-PSResource
        [-Path] <String>
        [-ApiKey <String>]
        [-Repository <String>]
        [-DestinationPath <String>]
        [-Credential <PSCredential>]
        [-SkipDependenciesCheck]
        [-SkipModuleManifestValidate]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: PathParameterSet
  isDefault: false
- syntax: |-
    ```Syntax
    Publish-PSResource
        -NupkgPath <String>
        [-ApiKey <String>]
        [-Repository <String>]
        [-DestinationPath <String>]
        [-Credential <PSCredential>]
        [-SkipDependenciesCheck]
        [-SkipModuleManifestValidate]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NupkgPathParameterSet
  isDefault: false
