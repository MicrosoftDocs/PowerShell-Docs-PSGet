        [-NoClobber]
        [-SkipDependencyCheck]
        [-AuthenticodeCheck]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Install-PSResource
        [-InputObject] <PSResourceInfo[]>
        [-Repository <String[]>]
        [-Credential <PSCredential>]
        [-Scope <ScopeType>]
        [-TemporaryPath <String>]
        [-TrustRepository]
        [-Reinstall]
        [-Quiet]
        [-AcceptLicense]
