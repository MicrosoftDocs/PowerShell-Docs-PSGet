  isDefault: false
- syntax: |-
    ```Syntax
    Install-PSResource
        -RequiredResourceFile <String>
        [-Credential <PSCredential>]
        [-Scope <ScopeType>]
        [-TemporaryPath <String>]
        [-TrustRepository]
        [-Reinstall]
        [-Quiet]
        [-AcceptLicense]
        [-NoClobber]
        [-SkipDependencyCheck]
        [-AuthenticodeCheck]
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
