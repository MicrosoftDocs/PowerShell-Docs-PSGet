syntaxes:
- syntax: |-
    ```Syntax
    New-PSScriptFileInfo
        [-Path] <String>
        [-Version <String>]
        [-Author <String>]
        -Description <String>
        [-Guid <Guid>]
        [-CompanyName <String>]
        [-Copyright <String>]
        [-RequiredModules <Hashtable[]>]
        [-ExternalModuleDependencies <String[]>]
        [-RequiredScripts <String[]>]
        [-ExternalScriptDependencies <String[]>]
        [-Tags <String[]>]
        [-ProjectUri <String>]
        [-LicenseUri <String>]
        [-IconUri <String>]
        [-ReleaseNotes <String>]
        [-PrivateData <String>]
        [-Force]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
