        [-TemporaryPath <String>]
        [-TrustRepository]
        [-PassThru]
        [-SkipDependencyCheck]
        [-AuthenticodeCheck]
        [-Quiet]
        [-AcceptLicense]
        [-WhatIf]
        [-Confirm]
