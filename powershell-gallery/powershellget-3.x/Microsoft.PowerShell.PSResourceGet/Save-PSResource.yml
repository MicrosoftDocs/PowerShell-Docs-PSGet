    ```Syntax
    Save-PSResource
        [-Name] <String[]>
        [-Version <String>]
        [-Prerelease]
        [-Repository <String[]>]
        [-Credential <PSCredential>]
        [-IncludeXml]
        [-Path <String>]
        [-TemporaryPath <String>]
        [-TrustRepository]
        [-PassThru]
        [-SkipDependencyCheck]
        [-AuthenticodeCheck]
        [-Quiet]
        [-AcceptLicense]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: IncludeXmlParameterSet
  isDefault: true
- syntax: |-
