syntaxes:
- syntax: |-
    ```Syntax
    Compress-PSResource
        [-Path] <String>
        [-DestinationPath] <String>
        [-PassThru]
        [-SkipModuleManifestValidate]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
