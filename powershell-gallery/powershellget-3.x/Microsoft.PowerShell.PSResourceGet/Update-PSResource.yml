syntaxes:
- syntax: |-
    ```Syntax
    Update-PSResource
        [[-Name] <String[]>]
        [-Version <String>]
        [-Prerelease]
        [-Repository <String[]>]
        [-Scope <ScopeType>]
        [-TemporaryPath <String>]
        [-TrustRepository]
        [-Credential <PSCredential>]
        [-Quiet]
        [-AcceptLicense]
        [-Force]
        [-PassThru]
        [-SkipDependencyCheck]
        [-AuthenticodeCheck]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="Microsoft.PowerShell.PSResourceGet.UtilClasses.PSResourceInfo" data-throw-if-not-resolved="False" />
  description: |-
    By default, the cmdlet doesn't return any objects. When the **PassThru** parameter is used, the
    cmdlet outputs a **PSResourceInfo** object for the saved resource.
examples:
- title: Example 1
  description: |-
    In this example, the user already has the **TestModule** package installed and they update the
    package.

    ```powershell
    Get-PSResource -Name "TestModule"
    ```

    ```Output
    Name                                    Version                         Prerelease   Description
    ----                                    -------                         ----------   -----------
    TestModule                              1.2.0                                        test
    ```

    ```powershell
    Update-PSResource -Name "TestModule"
    ```

    ```Output
    Name                                    Version                         Prerelease   Description
    ----                                    -------                         ----------   -----------
    TestModule                              1.3.0                                        test
    TestModule                              1.2.0                                        test
    ```
