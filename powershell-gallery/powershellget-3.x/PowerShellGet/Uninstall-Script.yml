syntaxes:
- syntax: |-
    ```Syntax
    Uninstall-Script
        [-Name] <String[]>
        [-MinimumVersion <String>]
        [-RequiredVersion <String>]
        [-MaximumVersion <String>]
        [-Force]
        [-AllowPrerelease]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: NameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Uninstall-Script
        [-InputObject] <PSObject[]>
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: InputObject
  isDefault: false
