syntaxes:
- syntax: |-
    ```Syntax
    Publish-Module
        -Name <String>
        [-RequiredVersion <String>]
        [-NuGetApiKey <String>]
        [-Repository <String>]
        [-Credential <PSCredential>]
        [-FormatVersion <Version>]
        [-ReleaseNotes <String[]>]
        [-Tags <String[]>]
        [-LicenseUri <Uri>]
        [-IconUri <Uri>]
        [-ProjectUri <Uri>]
        [-Exclude <String[]>]
        [-Force]
        [-AllowPrerelease]
        [-SkipAutomaticTags]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: ModuleNameParameterSet
  isDefault: true
- syntax: |-
    ```Syntax
    Publish-Module
        -Path <String>
        [-NuGetApiKey <String>]
        [-Repository <String>]
        [-Credential <PSCredential>]
        [-FormatVersion <Version>]
        [-ReleaseNotes <String[]>]
        [-Tags <String[]>]
        [-LicenseUri <Uri>]
        [-IconUri <Uri>]
        [-ProjectUri <Uri>]
        [-Force]
        [-SkipAutomaticTags]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
