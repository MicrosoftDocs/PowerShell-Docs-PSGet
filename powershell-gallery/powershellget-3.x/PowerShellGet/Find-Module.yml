syntaxes:
- syntax: |-
    ```Syntax
    Find-Module
        [[-Name] <string[]>]
        [-MinimumVersion <string>]
        [-MaximumVersion <string>]
        [-RequiredVersion <string>]
        [-AllVersions]
        [-IncludeDependencies]
        [-Filter <string>]
        [-Tag <string[]>]
        [-Includes <string[]>]
        [-DscResource <string[]>]
        [-RoleCapability <string[]>]
        [-Command <string[]>]
        [-Proxy <uri>]
        [-ProxyCredential <pscredential>]
        [-Repository <string[]>]
        [-Credential <pscredential>]
        [-AllowPrerelease]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
