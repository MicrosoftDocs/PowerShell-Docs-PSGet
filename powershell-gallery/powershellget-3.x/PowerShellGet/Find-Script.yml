syntaxes:
- syntax: |-
    ```Syntax
    Find-Script
        [[-Name] <String[]>]
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-RequiredVersion <String>]
        [-AllVersions]
        [-IncludeDependencies]
        [-Filter <String>]
        [-Tag <String[]>]
        [-Includes <String[]>]
        [-Command <String[]>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Repository <String[]>]
        [-Credential <PSCredential>]
        [-AllowPrerelease]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
