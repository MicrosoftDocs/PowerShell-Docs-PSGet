syntaxes:
- syntax: |-
    ```Syntax
    Get-InstalledModule
        [[-Name] <String[]>]
        [-MinimumVersion <String>]
        [-RequiredVersion <String>]
        [-MaximumVersion <String>]
        [-AllVersions]
        [-AllowPrerelease]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
