syntaxes:
- syntax: |-
    ```Syntax
    New-ScriptFileInfo
        [[-Path] <String>]
        -Description <String>
        [-Version <String>]
        [-Author <String>]
        [-Guid <Guid>]
        [-CompanyName <String>]
        [-Copyright <String>]
        [-RequiredModules <Object[]>]
        [-ExternalModuleDependencies <String[]>]
        [-RequiredScripts <String[]>]
        [-ExternalScriptDependencies <String[]>]
        [-Tags <String[]>]
        [-ProjectUri <Uri>]
        [-LicenseUri <Uri>]
        [-IconUri <Uri>]
        [-ReleaseNotes <String[]>]
        [-PrivateData <String>]
        [-PassThru]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
