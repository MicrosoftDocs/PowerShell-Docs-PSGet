syntaxes:
- syntax: |-
    ```Syntax
    Find-DscResource
        [[-Name] <String[]>]
        [-ModuleName <String>]
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-RequiredVersion <String>]
        [-AllVersions]
        [-AllowPrerelease]
        [-Tag <String[]>]
        [-Filter <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Repository <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false
