syntaxes:
- syntax: |-
    ```Syntax
    Set-PSRepository
        [-Name] <String>
        [[-SourceLocation] <Uri>]
        [-PublishLocation <Uri>]
        [-ScriptSourceLocation <Uri>]
        [-ScriptPublishLocation <Uri>]
        [-Credential <PSCredential>]
        [-InstallationPolicy <String>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-PackageManagementProvider <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
